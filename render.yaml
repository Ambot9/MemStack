services:
  - type: web
    name: memstack
    runtime: dotnet
    plan: free
    buildCommand: dotnet publish MemStack/MemStack.csproj -c Release -o out
    startCommand: dotnet out/MemStack.dll
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATABASE_PATH
        value: /var/data/memstack.db
      - key: GitPersistence__Enabled
        value: "false"
